<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>العنوان الوطني | National Address</title>
    
    <!-- إعدادات معاينة الرابط عند الإرسال (واتساب، تويتر، ديسكورد، وغيرها) -->
    <meta property="og:title" content="العنوان الوطني الخاص بي">
    <meta property="og:description" content="تفاصيل العنوان الوطني والموقع على الخريطة لتسهيل التوصيل والوصول.">
    <meta property="og:image" content="5.png">
    <meta property="og:type" content="website">

    <!-- إعدادات المعاينة الإضافية لتويتر والمنصات الأخرى -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="العنوان الوطني الخاص بي">
    <meta name="twitter:description" content="تفاصيل العنوان الوطني والموقع على الخريطة لتسهيل التوصيل والوصول.">
    <meta name="twitter:image" content="5.png">

    <!-- خطوط احترافية من جوجل -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-gradient: radial-gradient(circle at 50% 30%, #1e293b 0%, #0f172a 100%);
            --card-bg: rgba(15, 23, 42, 0.65);
            --border-glow: rgba(255, 255, 255, 0.08);
            --primary-accent: #0087c8;
            --secondary-accent: #702f8a;
            --maps-green: #10b981;
            --text-white: #ffffff;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: var(--bg-main);
            background-image: var(--bg-gradient);
            font-family: 'Tajawal', 'Inter', sans-serif;
            color: var(--text-white);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* 1. شاشة اختيار اللغة (Splash Screen) */
        #langOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(7, 10, 19, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 30px;
        }

        #langOverlay.fade-out {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.1);
        }

        .welcome-title {
            text-align: center;
            margin-bottom: 10px;
        }

        .welcome-title h2 {
            font-size: 24px;
            margin: 0 0 8px 0;
            background: linear-gradient(to right, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .lang-buttons-wrapper {
            display: flex;
            gap: 20px;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px 40px;
            border-radius: 16px;
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            width: 150px;
        }

        .lang-btn:hover {
            background: linear-gradient(135deg, var(--primary-accent), var(--secondary-accent));
            border-color: transparent;
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 135, 200, 0.3);
        }

        .lang-btn span {
            font-size: 12px;
            font-weight: 400;
            opacity: 0.7;
        }

        /* 2. حاوية البطاقة الرئيسية */
        .main-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            opacity: 0;
            transform: translateY(20px);
        }

        .main-container.show {
            opacity: 1;
            transform: translateY(0);
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glow);
            border-radius: 28px;
            padding: 30px 24px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            position: relative;
        }

        /* زر تغيير اللغة العائم */
        .switch-lang-floating {
            position: absolute;
            top: 25px;
            left: 25px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            font-weight: bold;
        }
        html[dir="ltr"] .switch-lang-floating {
            left: auto;
            right: 25px;
        }
        .switch-lang-floating:hover {
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }

        /* الشعار العلوي */
        .logo-section {
            text-align: center;
            margin-bottom: 25px;
            margin-top: 15px;
        }

        .logo-section svg {
            width: 55px; height: 55px;
            margin-bottom: 10px;
        }

        .logo-section h1 {
            font-size: 22px; margin: 0;
            font-weight: 800;
        }

        /* مربع العنوان المختصر */
        .hero-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }

        .hero-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .code-display {
            font-size: 38px;
            font-weight: 900;
            letter-spacing: 2px;
            margin: 0 0 15px 0;
            font-family: 'Inter', monospace;
            text-shadow: 0 0 15px rgba(255,255,255,0.1);
        }

        /* تفاصيل البيانات */
        .details-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .detail-item {
            background: rgba(255, 255, 255, 0.02);
            border-left: 3px solid var(--primary-accent);
            padding: 12px 16px;
            border-radius: 0 12px 12px 0;
        }

        html[dir="ltr"] .detail-item {
            border-left: none;
            border-right: 3px solid var(--primary-accent);
            border-radius: 12px 0 0 12px;
        }

        .detail-item.description-item {
            border-color: var(--secondary-accent);
            background: rgba(112, 47, 138, 0.05);
        }

        .item-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 4px;
            font-weight: 500;
        }

        .item-value {
            font-size: 15px;
            font-weight: 700;
            color: #e2e8f0;
        }

        /* الأزرار والإجراءات */
        .actions-wrapper {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        button {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            color: white;
        }

        .btn-copy {
            background: linear-gradient(135deg, var(--primary-accent), var(--secondary-accent));
            box-shadow: 0 8px 20px rgba(0, 135, 200, 0.2);
        }
        .btn-copy:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(0, 135, 200, 0.4);
        }

        .btn-maps {
            background: linear-gradient(135deg, #059669, #10b981);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.2);
        }
        .btn-maps:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(16, 185, 129, 0.4);
        }

        button:active {
            transform: translateY(1px);
        }

        button svg {
            width: 20px; height: 20px; fill: currentColor;
        }

        button.success {
            background: #10b981 !important;
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4) !important;
        }
    </style>
</head>
<body>

    <!-- 1. واجهة اختيار اللغة الترحيبية -->
    <div id="langOverlay">
        <div class="welcome-title">
            <h2>العنوان الوطني الإلكتروني</h2>
            <h2 style="font-family:'Inter'; font-size:18px;">National Address Portal</h2>
        </div>
        <div class="lang-buttons-wrapper">
            <button class="lang-btn" onclick="selectLanguage('ar')">
                العربية
                <span>Arabic</span>
            </button>
            <button class="lang-btn" onclick="selectLanguage('en')" style="font-family:'Inter';">
                English
                <span>إنجليزي</span>
            </button>
        </div>
    </div>

    <!-- 2. محتوى الموقع الرئيسي -->
    <div class="main-container" id="mainContainer">
        <div class="card">
            
            <button class="switch-lang-floating" onclick="toggleLangLanguage()" id="langSwitcherBtn">English</button>

            <div class="logo-section">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 21C16.5 17.4 20 13.5 20 9.5C20 5.08172 16.4183 1.5 12 1.5C7.58172 1.5 4 5.08172 4 9.5C4 13.5 7.5 17.4 12 21Z" stroke="url(#p1)" stroke-width="2.5"/>
                    <circle cx="12" cy="9.5" r="3.5" stroke="url(#p2)" stroke-width="2"/>
                    <defs>
                        <linearGradient id="p1" x1="4" y1="1.5" x2="20" y2="21" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#0087c8"/><stop offset="1" stop-color="#702f8a"/>
                        </linearGradient>
                        <linearGradient id="p2" x1="8.5" y1="6" x2="15.5" y2="13" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#e02044"/><stop offset="1" stop-color="#702f8a"/>
                        </linearGradient>
                    </defs>
                </svg>
                <h1 id="uiTitle">العنوان الوطني</h1>
            </div>

            <div class="hero-box">
                <div class="hero-label" id="uiShortAddressLabel">العنوان المختصر</div>
                <div class="code-display" id="shortCode">JDSA2713</div>
            </div>

            <div class="details-list">
                <div class="detail-item">
                    <div class="item-label" id="uiDistrictLabel">الحي</div>
                    <div class="item-value" id="uiDistrictValue">حي الصفا 2</div>
                </div>
                <div class="detail-item">
                    <div class="item-label" id="uiStreetLabel">الشارع</div>
                    <div class="item-value" id="uiStreetValue">شارع محمد صالح نصيف</div>
                </div>
                <div class="detail-item description-item">
                    <div class="item-label" id="uiDescLabel">الوصف المفصل للبيت</div>
                    <div class="item-value" id="uiDescValue">بعد شواية بلدي يمين، أول عمارة على اليسار</div>
                </div>
            </div>

            <div class="actions-wrapper">
                <button class="btn-copy" onclick="handleCopy()" id="copyBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    <span id="uiCopyTxt">نسخ العنوان المختصر</span>
                </button>
                
                <button class="btn-maps" onclick="openGoogleMaps()">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                    <span id="uiMapsTxt">الموقع على Google Maps</span>
                </button>
            </div>

        </div>
    </div>

    <script>
        const dictionary = {
            ar: {
                title: "العنوان الوطني",
                shortLabel: "العنوان المختصر",
                districtLabel: "الحي",
                districtVal: "حي الصفا 2",
                streetLabel: "الشارع",
                streetVal: "شارع محمد صالح نصيف",
                descLabel: "الوصف المفصل للبيت (للمنديب والأهل)",
                descVal: "بعد شواية بلدي يمين، أول عمارة على اليسار",
                copyBtnTxt: "نسخ العنوان المختصر",
                copiedTxt: "تم النسخ بنجاح! ✔️",
                mapsBtnTxt: "الموقع على Google Maps",
                switcher: "English",
                dir: "rtl"
            },
            en: {
                title: "National Address",
                shortLabel: "Short Address Code",
                districtLabel: "District",
                districtVal: "Al Safa 2 District",
                streetLabel: "Street",
                streetVal: "Muhammad Salih Nassif St.",
                descLabel: "Detailed House Description (For Delivery)",
                descVal: "After Shawaya Baladi turn right, 1st building on the left",
                copyBtnTxt: "Copy Short Code",
                copiedTxt: "Copied Successfully! ✔️",
                mapsBtnTxt: "Open in Google Maps",
                switcher: "العربية",
                dir: "ltr"
            }
        };

        let currentLang = 'ar';

        function selectLanguage(lang) {
            currentLang = lang;
            applyLocalization();
            
            document.getElementById("langOverlay").classList.add("fade-out");
            setTimeout(() => {
                document.getElementById("mainContainer").classList.add("show");
            }, 300);
        }

        function toggleLangLanguage() {
            currentLang = (currentLang === 'ar') ? 'en' : 'ar';
            applyLocalization();
        }

        function applyLocalization() {
            const data = dictionary[currentLang];
            
            document.documentElement.setAttribute("dir", data.dir);
            document.documentElement.lang = currentLang;
            
            document.getElementById("uiTitle").innerText = data.title;
            document.getElementById("uiShortAddressLabel").innerText = data.shortLabel;
            document.getElementById("uiDistrictLabel").innerText = data.districtLabel;
            document.getElementById("uiDistrictValue").innerText = data.districtVal;
            document.getElementById("uiStreetLabel").innerText = data.streetLabel;
            document.getElementById("uiStreetValue").innerText = data.streetVal;
            document.getElementById("uiDescLabel").innerText = data.descLabel;
            document.getElementById("uiDescValue").innerText = data.descVal;
            document.getElementById("uiCopyTxt").innerText = data.copyBtnTxt;
            document.getElementById("uiMapsTxt").innerText = data.mapsBtnTxt;
            document.getElementById("langSwitcherBtn").innerText = data.switcher;
        }

        function handleCopy() {
            const codeText = document.getElementById("shortCode").innerText;
            const btn = document.getElementById("copyBtn");
            const btnTxtSpan = document.getElementById("uiCopyTxt");
            const originalHTML = btn.innerHTML;

            const tempTextArea = document.createElement("textarea");
            tempTextArea.value = codeText;
            document.body.appendChild(tempTextArea);
            tempTextArea.select();
            tempTextArea.setSelectionRange(0, 99999);

            try {
                document.execCommand("copy");
                btn.classList.add("success");
                btnTxtSpan.innerText = dictionary[currentLang].copiedTxt;
            } catch (err) {
                alert("يرجى نسخ الكود يدوياً: " + codeText);
            }

            document.body.removeChild(tempTextArea);

            setTimeout(() => {
                btn.classList.remove("success");
                btn.innerHTML = originalHTML;
                btnTxtSpan.innerText = dictionary[currentLang].copyBtnTxt;
            }, 2000);
        }

        function openGoogleMaps() {
            const mapsUrl = "https://www.google.com/maps/search/?api=1&query=شارع+محمد+صالح+نصيف+الصفا+جدة";
            window.open(mapsUrl, '_blank');
        }
    </script>
</body>
</html>
